# Use Docker's embedded DNS resolver — defers name resolution to request time
# so nginx doesn't crash at startup if "backend" isn't resolvable yet.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50M;

    location /api/ {
        # Use a variable so nginx resolves at request time, not at config load.
        # Without this, nginx crashes on startup if "backend" hostname isn't
        # resolvable yet (Docker DNS timing issue).
        set $backend_upstream "http://${BACKEND_HOST}:5000";
        proxy_pass $backend_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;  # important for SSE streaming
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
