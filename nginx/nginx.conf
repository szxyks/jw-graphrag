server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50M;

    location /api/ {
        # Strip /api/ prefix: /api/health -> /health
        rewrite ^/api/(.*)$ /$1 break;

        # Direct proxy_pass — no variable needed.
        # The "links: [backend:backend]" in docker-compose.yml adds backend
        # to /etc/hosts, so nginx resolves it at startup via the hosts file
        # (not DNS), avoiding the "host not found" crash.
        proxy_pass http://backend:5000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;  # important for SSE streaming
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
