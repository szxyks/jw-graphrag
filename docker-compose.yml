# ===========================================================================
# JW GraphRAG — Docker Compose
# ===========================================================================
# Services:
#   - postgres  : Postgres 16 + pgvector (chunk store + embeddings + graph)
#   - ollama    : Local LLM server (OPTIONAL — profile "bundled-ollama")
#                 If you already run Ollama on your host, skip this and use
#                 OLLAMA_HOST=http://host.docker.internal:11434 instead.
#   - backend   : Flask API (chat, search, ingest, graph endpoints)
#   - frontend  : Nginx serving Tailwind UI + proxying /api to backend
#   - ingest    : On-demand ingestion runner (invoked via `docker compose run`)
# ===========================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jw-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jwrag
      POSTGRES_USER: jwrag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jwrag_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jwrag -d jwrag"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ===========================================================================
  # Ollama — only started when you pass `--profile bundled-ollama`.
  # Default behavior: connect to your host Ollama (set OLLAMA_HOST in .env).
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: jw-rag-ollama
    restart: unless-stopped
    profiles: ["bundled-ollama"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    # NVIDIA GPU (uncomment to enable):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Pulls the required models into the bundled Ollama (only used with profile)
  ollama-init:
    image: ollama/ollama:latest
    container_name: jw-rag-ollama-init
    profiles: ["bundled-ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling LLM model ($${OLLAMA_LLM_MODEL:-llama3.2:3b})..."
        OLLAMA_HOST=http://ollama:11434 ollama pull "$${OLLAMA_LLM_MODEL:-llama3.2:3b}"
        echo "Pulling embedding model ($${OLLAMA_EMBED_MODEL:-nomic-embed-text})..."
        OLLAMA_HOST=http://ollama:11434 ollama pull "$${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
        if [ -n "$${EXTRA_LLM_MODEL}" ]; then
          echo "Pulling extra model: $$EXTRA_LLM_MODEL ..."
          OLLAMA_HOST=http://ollama:11434 ollama pull "$$EXTRA_LLM_MODEL"
        fi
        echo "Models ready."
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jw-rag-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Default: connect via Docker DNS to the postgres service
      # In host network mode, set DATABASE_URL=postgresql://jwrag:...@127.0.0.1:5432/jwrag in .env
      DATABASE_URL: ${DATABASE_URL:-postgresql://jwrag:${POSTGRES_PASSWORD:-jwrag_dev}@postgres:5432/jwrag}
      # Default: use host Ollama (works on Docker Desktop / Linux with host-gateway)
      # Override in .env to http://ollama:11434 if using the bundled-ollama profile.
      # If using BACKEND_NETWORK_MODE=host, set this to http://127.0.0.1:11434
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen2.5:latest}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
    # Set BACKEND_NETWORK_MODE=host in .env to bypass Docker bridge networking
    # entirely — useful when your firewall blocks Docker bridge → host traffic.
    # When using host mode, also set OLLAMA_HOST=http://127.0.0.1:11434
    # and DATABASE_URL=postgresql://jwrag:jwrag_dev@127.0.0.1:5432/jwrag
    # NOTE: when network_mode is unset/empty, the container joins the compose
    # project network normally (this is what we want by default).
    ${BACKEND_NETWORK_MODE:+network_mode: host}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/app
      - ./scripts:/scripts:ro
      - ./data/downloads:/data/downloads
      # Mount the Docker socket so the backend can spawn one-shot ingest runs
      # via `docker compose run --rm ingest python ingest.py ...`
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/docker-compose.yml:ro
    # Linux only: enables host.docker.internal resolution (ignored in host network mode)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python app.py

  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: jw-rag-ingest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://jwrag:${POSTGRES_PASSWORD:-jwrag_dev}@postgres:5432/jwrag
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen2.5:latest}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./ingest:/app
      - ./scripts:/scripts:ro
      - ./data/downloads:/data/downloads
      - ./data/extracted:/data/extracted
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["ingest"]

  frontend:
    image: nginx:alpine
    container_name: jw-rag-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Use `links` to ensure the frontend can resolve the backend hostname
    # even if Docker DNS has issues on this host.
    links:
      - backend:backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-backend}
    extra_hosts:
      - "host.docker.internal:host-gateway"
